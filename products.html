<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">MobileStore</div>

    

    <div class="nav-search">
        <input type="text" placeholder="Search smartphones...">
        <button>🔍</button>
    </div>

    <div class="nav-right">
        <a href="#">Login</a>
        <a href="#">Cart 🛒</a>
    </div>
</nav>

<section class="products">
    <h2>All Smartphones</h2>

    <div class="product-grid">
        <div class="card">
            <img src="iphone 15.jpg">
            <h3>iPhone 15 Pro</h3>
            <p>₹1,29,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="images.jpg">
            <h3>Samsung S24 Ultra</h3>
            <p>₹1,19,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="oneplus.jpg">
            <h3>OnePlus 12R</h3>
            <p>₹42,999</p>
            <button>Buy Now</button>
        </div>

        <div class="card">
            <img src="xiaomi14.jpg">
            <h3>Xiaomi 14</h3>
            <p>₹69,999</p>
            <button>Buy Now</button>
        </div>
    </div>
</section>

</body>
</html>
